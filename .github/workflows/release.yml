name: Release Android APK

# Fires when you push a tag like v0.2.0. Builds the web bundle, syncs into
# Capacitor's android/ project, signs the APK using credentials from Secrets,
# and uploads the APK to a GitHub Release named after the tag.
#
# To cut a release locally:
#   git tag v0.2.0
#   git push origin v0.2.0
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to create the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so auto-generated release notes see prior tags

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm ci

      - name: Build Vite bundle
        # VITE_* env vars are inlined into the bundle at build time. The
        # Supabase URL + publishable key are designed to be client-visible
        # (RLS protects actual data) — they live in .env.local locally and
        # in GitHub Secrets for CI builds.
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_AMAP_JSAPI_KEY: ${{ secrets.VITE_AMAP_JSAPI_KEY }}
          VITE_AMAP_SECURITY_JS_CODE: ${{ secrets.VITE_AMAP_SECURITY_JS_CODE }}
          VITE_AMAP_SERVICE_HOST: ${{ secrets.VITE_AMAP_SERVICE_HOST }}
        run: npm run build

      - name: Diagnose dist/ output
        # v0.1.0 produced a half-size bundle missing most app code; suspected
        # Rolldown/Vite Linux tree-shaking bug. This step prints the bundle
        # inventory + grep-checks for key strings so we can confirm.
        run: |
          echo "=== dist/assets/ ==="
          ls -la dist/assets/
          echo "=== bundle key string presence ==="
          for s in "Ultreia" "Check for updates" "无法" "登录" "Easy Run" "0.1.0"; do
            n=$(grep -ac "$s" dist/assets/index-*.js || echo 0)
            echo "  '$s': $n"
          done

      - name: Upload dist/ as artifact for inspection
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

      - name: Sync Capacitor → android/
        run: npx cap sync android

      - name: Decode keystore from Secret
        # ANDROID_KEYSTORE_BASE64 holds the .jks file base64-encoded.
        # We write it to RUNNER_TEMP (auto-cleaned) and expose the path
        # to gradle via env var (read by android/app/build.gradle).
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "ANDROID_KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Derive versionName + versionCode from tag
        # versionName = tag without leading "v" (so v0.2.0 → 0.2.0)
        # versionCode = GitHub run number — guaranteed monotonic increase,
        # which is what Android requires for upgrades to work.
        run: |
          echo "ANDROID_VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK with version
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             "ultreia-${GITHUB_REF_NAME}.apk"

      - name: Build release notes from changelog
        # The in-app "Check for updates" dialog shows this body verbatim, so
        # keep it to just THIS release's visible changes. Prefer changelog
        # bullets added since the previous tag so multiple same-day releases do
        # not repeat the whole day's notes. The body intentionally omits the date
        # heading because older app versions localize unknown markdown headings
        # too aggressively.
        run: |
          release_day=$(TZ=Asia/Shanghai date +%F)
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -n "$prev" ]; then
            notes=$(git diff --unified=0 "$prev" "${GITHUB_REF_NAME}" -- docs/changelog.md | awk '/^\+- / { sub(/^\+/, ""); print }')
          else
            notes=$(awk -v day="$release_day" '
              $0 == "## " day { in_section=1; next }
              in_section && /^## / { exit }
              in_section && /^- / { print }
            ' docs/changelog.md)
          fi
          if [ -z "$(printf "%s" "$notes" | tr -d "[:space:]")" ]; then
            echo "::error::docs/changelog.md has no new release notes for ${GITHUB_REF_NAME}."
            echo "::error::Add concrete user-visible bullets before tagging."
            exit 1
          fi
          {
            echo 'RELEASE_NOTES<<__TSEOF__'
            echo "$notes"
            echo '__TSEOF__'
          } >> "$GITHUB_ENV"

      - name: Mirror release metadata and APK to Supabase Storage
        # Uploads a tiny public JSON manifest for update checks, plus both a
        # versioned APK mirror and the legacy stable latest APK. The app falls
        # back to GitHub if this step fails, so release creation should continue.
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SERVICE_ROLE" ]; then
            echo "Supabase secrets missing — skipping mirror upload."
            exit 0
          fi

          versioned_apk="ultreia-${GITHUB_REF_NAME}.apk"
          versioned_object="releases/$versioned_apk"
          latest_object="releases/ultreia-latest.apk"
          manifest_object="releases/ultreia-latest.json"
          public_base="${SUPABASE_URL%/}/storage/v1/object/public"

          python3 - <<'PY'
          import json
          import os

          tag = os.environ["GITHUB_REF_NAME"]
          version = tag[1:] if tag.startswith("v") else tag
          supabase_url = os.environ["SUPABASE_URL"].rstrip("/")
          manifest = {
              "version": version,
              "tagName": tag,
              "htmlUrl": f"https://github.com/7Wilf7/Ultreia/releases/tag/{tag}",
              "mirrorApkUrl": f"{supabase_url}/storage/v1/object/public/releases/ultreia-{tag}.apk",
              "notes": os.environ.get("RELEASE_NOTES", ""),
          }
          with open("ultreia-latest.json", "w", encoding="utf-8") as f:
              json.dump(manifest, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

          upload_object() {
            local object_path="$1"
            local file_path="$2"
            local content_type="$3"
            local cache_control="$4"
            curl -fSL -X POST \
              "${SUPABASE_URL%/}/storage/v1/object/$object_path" \
              -H "Authorization: Bearer $SERVICE_ROLE" \
              -H "apikey: $SERVICE_ROLE" \
              -H "x-upsert: true" \
              -H "cache-control: $cache_control" \
              -H "Content-Type: $content_type" \
              --data-binary @"$file_path"
          }

          upload_object "$versioned_object" "$versioned_apk" "application/vnd.android.package-archive" "public, max-age=31536000, immutable"
          upload_object "$latest_object" "$versioned_apk" "application/vnd.android.package-archive" "no-cache"
          upload_object "$manifest_object" "ultreia-latest.json" "application/json; charset=utf-8" "no-cache"

          echo "Mirror manifest: $public_base/$manifest_object"
          echo "Versioned APK mirror: $public_base/$versioned_object"
          echo "Legacy latest APK mirror: $public_base/$latest_object"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ultreia-${{ github.ref_name }}.apk
          name: Ultreia ${{ github.ref_name }}
          generate_release_notes: false
          fail_on_unmatched_files: true
          body: ${{ env.RELEASE_NOTES }}
