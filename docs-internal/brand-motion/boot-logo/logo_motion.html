<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ultreia Boot Motion</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f3;
      --border: rgba(0,0,0,0.08);
      --text-primary: #0d0d0d;
      --text-secondary: #777;
      --text-tertiary: #aaa;
      --accent: #e64036;
      --speed-progress: 9%;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    #logo-root {
      width: min(92vw, 358.4px);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #logo-root svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
      text-rendering: geometricPrecision;
    }

    .atomic-motions {
      display: flex;
      gap: 1.5rem;
      align-items: flex-end;
      justify-content: center;
      flex-wrap: wrap;
    }

    .atom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .atom-stage {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .atom-stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 260ms cubic-bezier(0.34,1.56,0.64,1);
      transform-origin: center;
    }

    .atom-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .principles {
      max-width: 760px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      font-size: 11px;
      line-height: 1;
      padding: 5px 10px;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .pill.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      font: 12px/1.2 inherit;
      letter-spacing: 0.04em;
      padding: 8px 18px;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
    }

    button.primary {
      color: var(--bg);
      background: var(--text-primary);
      border-color: var(--text-primary);
    }

    .speed-control {
      width: min(340px, 80vw);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
    }

    .speed-caption,
    .speed-value {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .speed-value {
      min-width: 46px;
      text-align: right;
      color: var(--text-primary);
      text-transform: none;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      flex: 1;
      min-width: 120px;
      height: 24px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: grab;
      accent-color: var(--accent);
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--speed-progress), var(--border) var(--speed-progress), var(--border) 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -6.5px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      background: var(--accent);
      box-shadow: 0 1px 6px rgba(0,0,0,0.18);
    }

    .footer {
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: center;
      line-height: 1.7;
    }

    .p2m-chromeless .atomic-motions,
    .p2m-chromeless .principles,
    .p2m-chromeless .controls,
    .p2m-chromeless .footer {
      display: none;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      :root {
        --p2m-duration: 2600ms;
        --p2m-ease-establish: cubic-bezier(0.33, 0, 0.2, 1);
        --p2m-ease-reveal: cubic-bezier(0.16, 1, 0.3, 1);
      }

      #field,
      #left-ridge-cover,
      #summit-cover,
      #right-ridge-cover,
      #route-cover,
      #route-mask-wipe {
        animation-duration: var(--p2m-duration);
        animation-fill-mode: both;
        animation-timing-function: linear;
      }

      #field { animation-name: p2m-field-reveal; }
      #left-ridge-cover { animation-name: p2m-left-ridge-reveal; }
      #summit-cover { animation-name: p2m-summit-reveal; }
      #right-ridge-cover { animation-name: p2m-right-ridge-reveal; }
      #route-cover { animation-name: p2m-route-cover-finish; }
      #route-mask-wipe {
        animation-name: p2m-route-reveal;
        transform-box: fill-box;
        transform-origin: 50% 0%;
      }

      @keyframes p2m-field-reveal {
        0%, 4% { opacity: 0; animation-timing-function: cubic-bezier(0.33, 0, 0.2, 1); }
        36% { opacity: 1; animation-timing-function: linear; }
        100% { opacity: 1; }
      }

      @keyframes p2m-left-ridge-reveal {
        0%, 20% { opacity: 1; visibility: visible; animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
        55%, 100% { opacity: 0; visibility: hidden; }
      }

      @keyframes p2m-summit-reveal {
        0%, 24% { opacity: 1; visibility: visible; animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
        58%, 100% { opacity: 0; visibility: hidden; }
      }

      @keyframes p2m-right-ridge-reveal {
        0%, 28% { opacity: 1; visibility: visible; animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
        62%, 100% { opacity: 0; visibility: hidden; }
      }

      @keyframes p2m-route-reveal {
        0%, 34% { transform: scaleY(1); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
        68%, 100% { transform: scaleY(0); }
      }

      @keyframes p2m-route-cover-finish {
        0%, 67.9% { opacity: 1; visibility: visible; }
        68%, 100% { opacity: 0; visibility: hidden; }
      }
    }
  </style>
</head>
<body>
  <main id="logo-root" aria-label="Animated logo" data-p2m-duration="2600"></main>

  <section class="atomic-motions" aria-label="Atomic motion studies">
    <div class="atom" data-atom="hover"><div class="atom-stage"></div><span class="atom-label">Hover</span></div>
    <div class="atom" data-atom="pulse"><div class="atom-stage"></div><span class="atom-label">Pulse</span></div>
    <div class="atom" data-atom="arc"><div class="atom-stage"></div><span class="atom-label">Arc</span></div>
    <div class="atom" data-atom="press"><div class="atom-stage"></div><span class="atom-label">Press</span></div>
  </section>

  <div class="principles" id="principlesRow">
    <span class="pill" data-p="squashstretch">Squash &amp; stretch</span>
    <span class="pill" data-p="anticipation">Anticipation</span>
    <span class="pill" data-p="staging">Staging</span>
    <span class="pill" data-p="followthrough">Follow through</span>
    <span class="pill" data-p="overlap">Overlapping</span>
    <span class="pill" data-p="slowinout">Slow in / out</span>
    <span class="pill" data-p="arc">Arc</span>
    <span class="pill" data-p="secondary">Secondary action</span>
    <span class="pill" data-p="timing">Timing</span>
    <span class="pill" data-p="appeal">Appeal</span>
  </div>

  <div class="controls">
    <button class="primary" id="btnReplay" type="button">Replay</button>
    <button id="btnSlow" type="button">Slow motion</button>
    <label class="speed-control" for="speedSlider">
      <span class="speed-caption">Speed</span>
      <input id="speedSlider" type="range" min="0.25" max="2.5" step="0.05" value="0.45" aria-label="Animation speed">
      <span class="speed-value" id="speedValue">0.45x</span>
    </label>
  </div>

  <p class="footer">Click the main logo to replay | Drag speed | Try atomic motions</p>

  <script>
    const SVG_NS = "http://www.w3.org/2000/svg";
    const LOGO = {"tag":"svg","attrs":{"viewBox":"0 0 512 512","width":"512","height":"512","role":"img","aria-label":"Ultreia"},"children":[{"tag":"defs","attrs":{},"children":[{"tag":"mask","attrs":{"id":"route-wipe","x":"-96","y":"-96","width":"704","height":"704","maskUnits":"userSpaceOnUse","style":"mask-type:alpha"},"children":[{"tag":"rect","attrs":{"id":"route-mask-wipe","x":"-96","y":"-96","width":"704","height":"704","fill":"#fff"},"children":[]}]}]},{"tag":"g","attrs":{"id":"field"},"children":[{"tag":"image","attrs":{"id":"artwork","href":"../../../resources/splash-logo.png","x":"0","y":"0","width":"512","height":"512","preserveAspectRatio":"xMidYMid slice"},"children":[]},{"tag":"path","attrs":{"id":"left-ridge-cover","d":"M57.7 370 L97.9 318.3 L146.9 262.3 L197.5 201.3 L224.7 182.8 L223.1 227.4 L189.3 261.2 L164.3 298.2 L117.5 316.7 L83.2 349.3 Z","fill":"#0b0f0e","stroke":"#0b0f0e","stroke-width":"54","stroke-linecap":"round","stroke-linejoin":"round","opacity":"0","visibility":"hidden"},"children":[]},{"tag":"path","attrs":{"id":"summit-cover","d":"M223.1 201.3 L279.1 128.4 L314.5 101.2 L314.5 161.1 L269.9 220.9 L248.1 217.6 Z M279.1 166.5 L310.1 185 L305.8 206.8 L280.8 226.3 L265.5 216.6 L282.9 193.2 Z","fill":"#0b0f0e","stroke":"#0b0f0e","stroke-width":"48","stroke-linecap":"round","stroke-linejoin":"round","opacity":"0","visibility":"hidden"},"children":[]},{"tag":"path","attrs":{"id":"right-ridge-cover","d":"M304.7 144.7 L439.6 288.4 L331.9 251.4 L311.8 187.2 Z","fill":"#0b0f0e","stroke":"#0b0f0e","stroke-width":"56","stroke-linecap":"round","stroke-linejoin":"round","opacity":"0","visibility":"hidden"},"children":[]},{"tag":"path","attrs":{"id":"route-cover","d":"M99.6 512 L130.6 487 L167.6 438 L211.1 390.7 L251.9 350.9 L277.5 318.8 L265.5 296.5 L230.2 265.5 L211.1 243.8 L222 223.1 L254.6 206.8 L281.8 187.2 L298.2 163.2 L317.2 174.1 L310.7 209.5 L275.3 231.8 L249.2 244.8 L277.5 262.3 L321 282.9 L352.6 311.2 L328.1 340.1 L287.3 378.2 L246.5 424.4 L205.7 473.4 L176.3 512 Z","fill":"#0b0f0e","stroke":"#0b0f0e","stroke-width":"62","stroke-linecap":"round","stroke-linejoin":"round","opacity":"0","visibility":"hidden","mask":"url(#route-wipe)"},"children":[]}]}]};
    const SVG_TEXT = "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 512 512\" width=\"512\" height=\"512\" role=\"img\" aria-label=\"Ultreia\"><style>:root,svg{--bg:#ffffff;--surface:#f5f5f3;--text-primary:#0d0d0d;--text-secondary:#777;--text-tertiary:#aaa;--logo-wordmark:#363e47;--accent:#e64036;--red:#e64036;--red-bright:#ff493f;}<\/style>\n  <defs>\n    <mask id=\"route-wipe\" x=\"-96\" y=\"-96\" width=\"704\" height=\"704\" maskUnits=\"userSpaceOnUse\" style=\"mask-type:alpha\">\n      <rect id=\"route-mask-wipe\" x=\"-96\" y=\"-96\" width=\"704\" height=\"704\" fill=\"#fff\"/>\n    <\/mask>\n  <\/defs>\n  <g id=\"field\">\n    <image id=\"artwork\" href=\"../../../resources/splash-logo.png\" x=\"0\" y=\"0\" width=\"512\" height=\"512\" preserveAspectRatio=\"xMidYMid slice\"/>\n    <path id=\"left-ridge-cover\" d=\"M57.7 370 L97.9 318.3 L146.9 262.3 L197.5 201.3 L224.7 182.8 L223.1 227.4 L189.3 261.2 L164.3 298.2 L117.5 316.7 L83.2 349.3 Z\" fill=\"#0b0f0e\" stroke=\"#0b0f0e\" stroke-width=\"54\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0\" visibility=\"hidden\"/>\n    <path id=\"summit-cover\" d=\"M223.1 201.3 L279.1 128.4 L314.5 101.2 L314.5 161.1 L269.9 220.9 L248.1 217.6 Z M279.1 166.5 L310.1 185 L305.8 206.8 L280.8 226.3 L265.5 216.6 L282.9 193.2 Z\" fill=\"#0b0f0e\" stroke=\"#0b0f0e\" stroke-width=\"48\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0\" visibility=\"hidden\"/>\n    <path id=\"right-ridge-cover\" d=\"M304.7 144.7 L439.6 288.4 L331.9 251.4 L311.8 187.2 Z\" fill=\"#0b0f0e\" stroke=\"#0b0f0e\" stroke-width=\"56\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0\" visibility=\"hidden\"/>\n    <path id=\"route-cover\" d=\"M99.6 512 L130.6 487 L167.6 438 L211.1 390.7 L251.9 350.9 L277.5 318.8 L265.5 296.5 L230.2 265.5 L211.1 243.8 L222 223.1 L254.6 206.8 L281.8 187.2 L298.2 163.2 L317.2 174.1 L310.7 209.5 L275.3 231.8 L249.2 244.8 L277.5 262.3 L321 282.9 L352.6 311.2 L328.1 340.1 L287.3 378.2 L246.5 424.4 L205.7 473.4 L176.3 512 Z\" fill=\"#0b0f0e\" stroke=\"#0b0f0e\" stroke-width=\"62\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0\" visibility=\"hidden\" mask=\"url(#route-wipe)\"/>\n  <\/g>\n<\/svg>\n";
    const SVG_URI = "../../../resources/splash-logo.png";
    const DURATION = 2600;

    let playbackRate = 0.45;
    let pulseRaf = null;
    let arcRaf = null;
    window.__p2mReady = false;

    function createSvgNode(node) {
      const element = document.createElementNS(SVG_NS, node.tag);
      for (const [name, value] of Object.entries(node.attrs || {})) {
        element.setAttribute(name, value);
      }
      if (node.text) {
        element.appendChild(document.createTextNode(node.text));
      }
      for (const child of node.children || []) {
        element.appendChild(createSvgNode(child));
      }
      return element;
    }

    function heroAnimations() {
      const root = document.getElementById("logo-root");
      if (root.getAnimations) return root.getAnimations({ subtree: true });
      return document.getAnimations().filter(animation => {
        const target = animation.effect && animation.effect.target;
        return target && root.contains(target);
      });
    }

    function applyPlaybackRate() {
      for (const animation of heroAnimations()) {
        if (animation.updatePlaybackRate) animation.updatePlaybackRate(playbackRate);
        else animation.playbackRate = playbackRate;
      }
    }

    function renderHero() {
      const root = document.getElementById("logo-root");
      root.replaceChildren(createSvgNode(LOGO));
      const svg = root.querySelector("svg");
      if (svg) {
        svg.removeAttribute("width");
        svg.removeAttribute("height");
        svg.style.width = "100%";
        svg.style.height = "auto";
        svg.style.overflow = "visible";
      }
      requestAnimationFrame(() => requestAnimationFrame(applyPlaybackRate));
    }

    function flashPills(...names) {
      document.querySelectorAll(".pill").forEach(pill => pill.classList.remove("active"));
      names.forEach(name => {
        const pill = document.querySelector(`[data-p="${name}"]`);
        if (pill) pill.classList.add("active");
      });
    }

    function cyclePrinciples() {
      const phases = [
        ["staging", "timing"],
        ["anticipation", "squashstretch"],
        ["arc", "slowinout"],
        ["overlap", "followthrough"],
        ["appeal"]
      ];
      let i = 0;
      flashPills(...phases[0]);
      return setInterval(() => {
        i = (i + 1) % phases.length;
        flashPills(...phases[i]);
      }, Math.max(240, DURATION / phases.length / Math.max(playbackRate, 0.25)));
    }

    let pillTimer = null;
    function replayMain() {
      clearInterval(pillTimer);
      renderHero();
      pillTimer = cyclePrinciples();
      setTimeout(() => {
        clearInterval(pillTimer);
        document.querySelectorAll(".pill").forEach(pill => pill.classList.remove("active"));
      }, DURATION / Math.max(playbackRate, 0.25) + 600);
    }

    function formatSpeed(rate) {
      return `${rate.toFixed(2)}x`;
    }

    function updateSpeedUI() {
      const slider = document.getElementById("speedSlider");
      const value = Number(slider.value);
      const min = Number(slider.min);
      const max = Number(slider.max);
      const progress = ((value - min) / (max - min)) * 100;
      document.getElementById("speedValue").textContent = formatSpeed(value);
      slider.style.setProperty("--speed-progress", `${progress}%`);
      const slow = value <= 0.251;
      const btnSlow = document.getElementById("btnSlow");
      btnSlow.textContent = slow ? "Normal speed" : "Slow motion";
      btnSlow.style.background = slow ? "var(--surface)" : "";
      btnSlow.style.borderColor = slow ? "var(--text-secondary)" : "";
    }

    function setPlaybackRate(rate, replay = false) {
      const slider = document.getElementById("speedSlider");
      const min = Number(slider.min);
      const max = Number(slider.max);
      playbackRate = Math.min(max, Math.max(min, Number(rate)));
      slider.value = String(playbackRate);
      updateSpeedUI();
      applyPlaybackRate();
      if (replay) replayMain();
    }

    function setupAtomImages() {
      document.querySelectorAll(".atom-stage").forEach(stage => {
        const img = new Image();
        img.src = SVG_URI;
        img.alt = "";
        stage.appendChild(img);
      });
    }

    function setupAtoms() {
      const hover = document.querySelector('[data-atom="hover"] img');
      const pulse = document.querySelector('[data-atom="pulse"] img');
      const arc = document.querySelector('[data-atom="arc"] img');
      const press = document.querySelector('[data-atom="press"] img');

      hover.parentElement.addEventListener("mouseenter", () => {
        flashPills("squashstretch", "appeal");
        hover.style.transform = "scale(1.08) rotate(-1.5deg)";
      });
      hover.parentElement.addEventListener("mouseleave", () => {
        hover.style.transform = "scale(1)";
      });

      function pulseTick(ts) {
        const p = (Math.sin(ts / 900) + 1) / 2;
        pulse.style.transform = `scale(${1 + 0.1 * p})`;
        pulseRaf = requestAnimationFrame(pulseTick);
      }
      if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        pulseRaf = requestAnimationFrame(pulseTick);
      }

      let arcAngle = -14;
      let arcVel = 0;
      function arcTick() {
        arcVel += (0 - arcAngle) * 0.08;
        arcVel *= 0.86;
        arcAngle += arcVel;
        arc.style.transform = `rotate(${arcAngle}deg)`;
        arcRaf = requestAnimationFrame(arcTick);
      }
      arc.parentElement.addEventListener("mouseenter", () => {
        flashPills("arc", "anticipation", "appeal");
        cancelAnimationFrame(arcRaf);
        arcAngle = 28;
        arcVel = 0;
        arcTick();
      });
      arc.parentElement.addEventListener("mouseleave", () => {
        arcAngle = 0;
      });

      press.parentElement.addEventListener("mousedown", () => {
        flashPills("squashstretch", "anticipation");
        press.style.transform = "scaleX(1.10) scaleY(0.88)";
      });
      ["mouseup", "mouseleave"].forEach(ev => {
        press.parentElement.addEventListener(ev, () => {
          press.style.transform = "scale(1)";
        });
      });
    }

    function applyQaMode() {
      const params = new URLSearchParams(location.search);
      const seekMs = params.get("t");
      const staticMode = params.get("static");
      if (seekMs === null && staticMode === null) {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          applyPlaybackRate();
          window.__p2mReady = true;
        }));
        return;
      }

      document.documentElement.classList.add("p2m-chromeless");
      cancelAnimationFrame(pulseRaf);
      cancelAnimationFrame(arcRaf);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        for (const animation of heroAnimations()) {
          if (staticMode !== null) {
            try {
              animation.finish();
            } catch (err) {
              animation.cancel();
            }
          } else {
            animation.pause();
            animation.currentTime = Number(seekMs);
          }
        }
        window.__p2mReady = true;
      }));
    }

    document.getElementById("btnReplay").addEventListener("click", replayMain);
    document.getElementById("logo-root").addEventListener("click", replayMain);
    document.getElementById("speedSlider").addEventListener("input", event => {
      setPlaybackRate(event.target.value, false);
    });
    document.getElementById("btnSlow").addEventListener("click", () => {
      const slow = Number(document.getElementById("speedSlider").value) <= 0.251;
      setPlaybackRate(slow ? 0.45 : 0.25, true);
    });

    setupAtomImages();
    setupAtoms();
    setPlaybackRate(0.45, false);
    renderHero();
    applyQaMode();
  </script>
</body>
</html>
